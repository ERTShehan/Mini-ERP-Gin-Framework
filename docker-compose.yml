version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: erp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Ijse@1234
      MYSQL_DATABASE: minierp
    ports:
      - "3306:3306"
    volumes:
      - ./Backend/database.sql:/docker-entrypoint-initdb.d/init.sql

      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: erp_backend
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=root:Ijse@1234@tcp(mysql_db:3306)/minierp
    depends_on:
      mysql_db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
